<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=630">
    <title>Lead Magnet Graphic</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        
        body {
            background: #1e293b;
            font-family: 'Inter', sans-serif;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto; /* Enable scrolling */
            overflow-x: auto;
        }

        .controls {
            margin-bottom: 30px;
            text-align: center;
            z-index: 9999;
        }

        .download-btn {
            background: #D4AF37;
            color: #020617;
            padding: 16px 32px;
            border-radius: 8px;
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(212, 175, 55, 0.4);
        }

        .graphic-wrapper {
            
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #020617 0%, #0A3161 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            position: relative;
            overflow: hidden;
            display: flex;
        
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            /* Ensure it is exactly the right size */
            width: 1200px !important;
            height: 630px !important;
            min-width: 1200px;
            min-height: 630px;
            position: relative;
            overflow: hidden;
        }
        

        .flag-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                #ffffff 20px,
                #ffffff 40px
            );
            z-index: 1;
        }

        .gold-accent {
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 100%;
            background: #D4AF37;
            z-index: 5;
        }

        .content-left {
            width: 50%;
            padding: 80px 80px 80px 100px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-right {
            width: 50%;
            position: relative;
            z-index: 10;
        }

        .book-mockup {
            position: absolute;
            top: 20px;
            right: 20px;
            height: 600px;
            transform: rotate(5deg);
            filter: drop-shadow(-20px 20px 30px rgba(0,0,0,0.5));
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 72px;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 25px;
            text-wrap: balance;
            color: #ffffff;
        }

        .highlight {
            color: #D4AF37;
        }

        p {
            font-size: 26px;
            color: #cbd5e1;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .arrow-down {
            width: 50px;
            height: 50px;
            border: 3px solid #D4AF37;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #D4AF37;
            font-size: 24px;
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-15px);}
            60% {transform: translateY(-7px);}
        }

        .partner-logo {
            max-height: 150px;
            max-width: 400px;
            object-fit: contain;
            margin-bottom: 40px;
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
</head>
<body>
    <div class="controls">
        <button id="downloadBtn" class="download-btn" onclick="downloadGraphic()">Download Graphic</button>
        <p style="text-align: center; margin-top: 1rem; color: #555;">Close this window to return to the Resource Center.</p>
        <p style="color: #94a3b8; font-size: 14px; text-align: center; margin-top: 15px;">
            Click <strong>Download Graphic</strong>, or right-click the image above and select <strong>Save Image As...</strong> to save it to your device.
        </p>
    </div>
    <div id="graphic-wrapper" class="graphic-wrapper">
        
    <div class="flag-bg"></div>
    <div class="gold-accent"></div>
    
    <div class="content-left">
        <img src="nc_assets/img/logo.svg" alt="Logo" class="partner-logo" id="logoImage">
        
        <h1>Claim Your <span class="highlight">Free</span> Master Copy</h1>
        <p>Honor our history and builders. Download the exclusive coloring book proudly supported by <strong id="companyNameText" style="color: #D4AF37;">Us</strong>.</p>
        
        <div class="arrow-down">↓</div>
    </div>

    <div class="content-right">
        <!-- The user's custom book cover will be injected here -->
        <img src="nc_assets/img/generated_true_cover.png" alt="Book Mockup" class="book-mockup" id="coverImage">
    </div>

    
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        
        const logoUrl = urlParams.get('logo');
        const logoImg = document.getElementById('logoImage');
        if(logoUrl && logoUrl !== '' && logoUrl !== 'null') {
            logoImg.crossOrigin = "anonymous";
            logoImg.src = logoUrl;
        } else {
            logoImg.style.display = 'none';
        }
        
        const coverUrl = urlParams.get('cover');
        if(coverUrl && coverUrl !== '' && coverUrl !== 'null') {
            const coverImg = document.getElementById('coverImage');
            coverImg.crossOrigin = "anonymous";
            coverImg.src = coverUrl;
        }
    
        if(urlParams.has('company') && urlParams.get('company') !== 'null' && urlParams.get('company') !== '') {
            const el = document.getElementById('companyNameText');
            if(el) el.innerText = urlParams.get('company');
        }

        function downloadGraphic() {
            const node = document.getElementById('graphic-wrapper');
            const btn = document.getElementById('downloadBtn');
            btn.innerText = 'Generating PNG...';
            
            htmlToImage.toPng(node, { quality: 1.0, pixelRatio: 2, cacheBust: true })
                .then(function (dataUrl) {
                    var link = document.createElement('a');
                    link.download = '250PROUD_Lead_Magnet.png';
                    link.href = dataUrl;
                    link.click();
                    btn.innerText = 'Download Graphic';
                })
                .catch(function (error) {
                    console.error('oops, something went wrong!', error);
                    btn.innerText = 'Download Failed - Take Screenshot';
                    alert('There was an issue generating the image (likely a CORS security block on the logos). You can alternatively right click the graphic and save it to your device.');
                });
        }
    
    </script>
</body>
</html>
