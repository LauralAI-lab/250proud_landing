  <text x="815" y="445" fill="#000000" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-weight="900" font-size="35">™</text>

  <!-- USA - 1776 - 2026 -->
  <text x="500" y="600" fill="#0A3161" font-family="'Helvetica Neue', 'Arial', sans-serif" font-weight="bold" font-size="36" text-anchor="middle" letter-spacing="12">USA • 1776 - 2026</text>
</svg>