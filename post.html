<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>250Proud Blog Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #D4AF37;
            --bg-dark: #0A0A0A;
            --text-light: #F5F5F5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-light); margin: 0; padding: 0; line-height: 1.8; }
        .hero { width: 100%; height: 400px; object-fit: cover; border-bottom: 2px solid var(--primary); }
        .container { max-width: 700px; margin: 0 auto; padding: 3rem 2rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--primary); margin-top: 0; line-height: 1.2; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem; }
        
        /* Markdown Content Styles */
        .content h2, .content h3 { font-family: 'Playfair Display', serif; color: var(--primary); margin-top: 2rem; }
        .content a { color: var(--primary); text-decoration: none; border-bottom: 1px dotted var(--primary); }
        .content img { max-width: 100%; border-radius: 8px; margin: 2rem 0; }
        .content blockquote { border-left: 4px solid var(--primary); margin: 0; padding-left: 1rem; color: #CCC; font-style: italic; }
        
        /* Subscribe Box */
        .subscribe-box { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 2rem; text-align: center; margin: 4rem 0; }
        .subscribe-box h3 { margin-top: 0; color: #FFF; }
        .subscribe-box input { padding: 10px; width: 60%; border-radius: 4px; border: none; margin-right: 10px; }
        .btn { background: var(--primary); color: #000; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* Comments */
        .comments-section { margin-top: 4rem; border-top: 1px solid var(--glass-border); padding-top: 2rem; }
        .comment { background: var(--glass-bg); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .comment-author { font-weight: bold; color: var(--primary); }
        .comment-date { font-size: 0.8rem; color: #888; }
        .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #FFF; border-radius: 4px; box-sizing: border-box; font-family: 'Inter', sans-serif;}
    </style>
</head>
<body>

<img id="hero-image" class="hero" style="display:none;">

<div class="container">
    <a href="/blog.html" style="color: #888; text-decoration: none; display: inline-block; margin-bottom: 2rem;">&larr; Back to Blog</a>
    
    <h1 id="post-title">Loading...</h1>
    <div class="meta" id="post-meta"></div>
    
    <div class="content" id="post-content"></div>

    <div class="subscribe-box">
        <h3>Join the Movement</h3>
        <p>Get updates on new resources, configurator tools, and the 250Proud mission.</p>
        <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <input type="email" id="sub-email" placeholder="Enter your email address...">
            <button class="btn" onclick="subscribe()">Subscribe</button>
        </div>
    </div>

    <div class="comments-section">
        <h2>Comments</h2>
        <div id="comments-list"></div>
        
        <div class="comment-form" style="margin-top: 3rem;">
            <h3>Leave a Reply</h3>
            <p style="font-size: 0.85rem; color:#888;">Your email address will not be published.</p>
            <input type="text" id="comment-name" placeholder="Name" required>
            <input type="email" id="comment-email" placeholder="Email" required>
            <textarea id="comment-text" rows="4" placeholder="Your comment..." required></textarea>
            <button class="btn" onclick="submitComment()">Post Comment</button>
        </div>
    </div>
</div>

<script>
    let currentPostId = null;

    async function loadPost() {
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('slug');
        if(!slug) return window.location.href = '/blog.html';

        try {
            const res = await fetch(`/api/blog/posts/${slug}`);
            if(!res.ok) throw new Error("Not found");
            const { post, comments } = await res.json();
            
            currentPostId = post.id;
            document.title = `${post.title} - 250Proud`;
            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-meta').innerHTML = `By Mike Price &bull; ${new Date(post.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
            
            if(post.hero_image_url) {
                const hero = document.getElementById('hero-image');
                hero.src = post.hero_image_url;
                hero.style.display = 'block';
            }

            document.getElementById('post-content').innerHTML = marked.parse(post.content);

            const commentsHtml = comments.length ? comments.map(c => `
                <div class="comment">
                    <div class="comment-author">${c.author_name}</div>
                    <div class="comment-date">${new Date(c.created_at).toLocaleDateString()}</div>
                    <p style="margin-bottom:0;">${c.content}</p>
                </div>
            `).join('') : '<p style="color:#888;">No comments yet. Be the first!</p>';
            
            document.getElementById('comments-list').innerHTML = commentsHtml;

        } catch(err) {
            document.getElementById('post-title').textContent = "Post Not Found";
            document.getElementById('post-content').innerHTML = "<p>The post you are looking for does not exist or has been removed.</p>";
        }
    }

    async function subscribe() {
        const email = document.getElementById('sub-email').value;
        if(!email) return alert('Please enter an email.');
        
        try {
            await fetch('/api/blog/subscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            alert('Thanks for subscribing!');
            document.getElementById('sub-email').value = '';
        } catch(e) {
            alert('An error occurred.');
        }
    }

    async function submitComment() {
        const author_name = document.getElementById('comment-name').value;
        const author_email = document.getElementById('comment-email').value;
        const content = document.getElementById('comment-text').value;

        if(!author_name || !author_email || !content) return alert('All fields are required.');
        if(!currentPostId) return;

        try {
            await fetch('/api/blog/comment', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: currentPostId, author_name, author_email, content })
            });
            alert('Your comment has been submitted and is awaiting moderation.');
            document.getElementById('comment-name').value = '';
            document.getElementById('comment-email').value = '';
            document.getElementById('comment-text').value = '';
        } catch(e) {
            alert('An error occurred submitting your comment.');
        }
    }

    loadPost();
</script>

</body>
</html>
