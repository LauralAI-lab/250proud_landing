<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>250Proud Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4AF37; /* Premium Gold */
            --bg-dark: #0A0A0A;
            --text-light: #F5F5F5;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(to bottom, rgba(212,175,55,0.1), transparent);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        p.subtitle {
            font-size: 1.2rem;
            color: #AAA;
            max-width: 600px;
            margin: 0 auto;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #111;
        }
        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: #FFF;
        }
        .card-date {
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    <h1>The 250Proud Journal</h1>
    <p class="subtitle">News, insights, and stories celebrating 250 years of American heritage.</p>
</header>

<div class="container">
    <div class="grid" id="posts-grid">
        <!-- Posts injected here -->
        <p style="text-align:center; width: 100%; color: #888;">Loading posts...</p>
    </div>
</div>

<script>
    async function fetchPosts() {
        try {
            const res = await fetch('/api/blog/posts');
            const posts = await res.json();
            const grid = document.getElementById('posts-grid');
            
            if (posts.length === 0) {
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#888;">No posts yet. Check back soon!</p>';
                return;
            }

            grid.innerHTML = posts.map(post => `
                <a href="/post.html?slug=${post.slug}" class="card">
                    <img src="${post.hero_image_url || 'https://via.placeholder.com/600x400/111/555?text=250Proud'}" class="card-img" alt="${post.title}">
                    <div class="card-content">
                        <h2 class="card-title">${post.title}</h2>
                        <div class="card-date">${new Date(post.published_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
                    </div>
                </a>
            `).join('');
        } catch(err) {
            console.error(err);
            document.getElementById('posts-grid').innerHTML = '<p style="color:red; text-align:center; width:100%;">Failed to load posts.</p>';
        }
    }

    fetchPosts();
</script>

</body>
</html>
