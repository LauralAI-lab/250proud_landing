<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today In History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Customizable variables overridden by JS */
            --primary-color: #D4AF37;
            --primary-hover: #b8922a;
            --bg-color: #121212;
            --text-color: #ffffff;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-muted: #94a3b8;
            --btn-text-color: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .tih-widget {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 3rem;
            align-items: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            max-width: 900px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            transition: border-color 0.3s ease;
        }

        .tih-widget:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tih-widget::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
        }

        .tih-bg-date {
            font-family: 'Oswald', sans-serif;
            font-size: 7rem;
            line-height: 1;
            color: rgba(255, 255, 255, 0.06);
            position: absolute;
            top: 10px;
            right: 30px;
            pointer-events: none;
            z-index: 0;
            text-transform: uppercase;
        }

        .tih-content {
            position: relative;
            z-index: 1;
        }

        .tih-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            display: block;
            font-weight: 700;
        }

        .tih-date-subheader {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-color);
            margin-bottom: 0.8rem;
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .tih-learn-more-link {
            display: inline-block;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            transition: opacity 0.2s ease;
        }

        .tih-learn-more-link:hover {
            opacity: 0.85;
            text-decoration: underline;
        }

        .tih-fact {
            font-size: 1.25rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-weight: 400;
            color: var(--text-color);
            opacity: 0.95;
        }

        .tih-btn {
            display: inline-block;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.9rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            text-align: center;
            background: var(--primary-color);
            color: var(--btn-text-color);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tih-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .tih-visual-container {
            display: flex;
            flex-direction: column;
            align-self: stretch;
            height: 100%;
            justify-content: space-between;
        }

        .tih-visual {
            position: relative;
            z-index: 1;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            flex: 1;
            min-height: 280px;
            display: flex;
            border: 1px solid var(--border-color);
        }

        .tih-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(100%) contrast(1.15);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .tih-widget:hover .tih-visual img {
            filter: grayscale(0%) contrast(1.1);
            transform: scale(1.02);
        }

        .tih-copyright {
            font-size: 0.68rem;
            color: var(--text-muted);
            opacity: 0.5;
            font-family: 'Inter', sans-serif;
            text-align: right;
            letter-spacing: 0.5px;
            margin-top: 0.6rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .tih-widget {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 2rem;
                overflow-y: auto;
                max-height: 98vh;
            }
            .tih-bg-date {
                font-size: 5rem;
                top: 5px;
                right: 15px;
            }
            .tih-date-subheader {
                font-size: 2rem;
            }
            .tih-visual {
                min-height: 220px;
            }
        }
    </style>
</head>
<body>

    <div class="tih-widget">
        <div class="tih-bg-date" id="tih-bg-date">TODAY</div>
        
        <div class="tih-content">
            <span class="tih-label" id="tih-year-label">ON THIS DAY IN AMERICAN HISTORY</span>
            <h3 class="tih-date-subheader" id="tih-date-subheader">Loading...</h3>
            <a href="#" id="tih-learn-more-link" target="_blank" class="tih-learn-more-link">Read Event Reference ↗</a>
            <p class="tih-fact" id="tih-fact-text">Loading the story...</p>
            
            <div>
                <a href="#" id="tih-cta-btn" target="_blank" class="tih-btn">View More Details</a>
            </div>
        </div>
        
        <div class="tih-visual-container">
            <div class="tih-visual">
                <img id="tih-fact-image" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Statue_of_Liberty%2C_NY.jpg" alt="Historical Event Illustration" data-fallback="https://upload.wikimedia.org/wikipedia/commons/d/d3/Statue_of_Liberty%2C_NY.jpg">
            </div>
            <div class="tih-copyright">
                © 2026 Today In History
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 1. Parse URL Query Parameters
            const params = new URLSearchParams(window.location.search);
            const primaryColor = params.get('primaryColor') || '#D4AF37';
            const ctaText = params.get('ctaText') || 'Find Your Home';
            const ctaLink = params.get('ctaLink') || 'https://250proud.net';
            const theme = params.get('theme') || 'dark';

            // Function to calculate a slightly darker color for hover effect
            function adjustColorBrightness(hex, percent) {
                let R = parseInt(hex.substring(1, 3), 16);
                let G = parseInt(hex.substring(3, 5), 16);
                let B = parseInt(hex.substring(5, 7), 16);

                R = parseInt(R * (100 + percent) / 100);
                G = parseInt(G * (100 + percent) / 100);
                B = parseInt(B * (100 + percent) / 100);

                R = (R < 255) ? R : 255;
                G = (G < 255) ? G : 255;
                B = (B < 255) ? B : 255;

                const rHex = R.toString(16).padStart(2, '0');
                const gHex = G.toString(16).padStart(2, '0');
                const bHex = B.toString(16).padStart(2, '0');

                return `#${rHex}${gHex}${bHex}`;
            }

            // Function to check if a color is light or dark to set appropriate button text color
            function getContrastYIQ(hexcolor){
                let r = parseInt(hexcolor.substring(1,3),16);
                let g = parseInt(hexcolor.substring(3,5),16);
                let b = parseInt(hexcolor.substring(5,7),16);
                let yiq = ((r*299)+(g*587)+(b*114))/1000;
                return (yiq >= 128) ? '#000000' : '#ffffff';
            }

            // Apply customizable styles dynamically
            document.documentElement.style.setProperty('--primary-color', primaryColor);
            try {
                const hoverColor = adjustColorBrightness(primaryColor, -15);
                document.documentElement.style.setProperty('--primary-hover', hoverColor);
                document.documentElement.style.setProperty('--btn-text-color', getContrastYIQ(primaryColor));
            } catch (e) {
                console.error("Color adjustment error:", e);
            }

            if (theme === 'light') {
                document.documentElement.style.setProperty('--bg-color', '#ffffff');
                document.documentElement.style.setProperty('--text-color', '#1e293b');
                document.documentElement.style.setProperty('--border-color', 'rgba(0, 0, 0, 0.08)');
                document.documentElement.style.setProperty('--card-bg', 'rgba(0, 0, 0, 0.02)');
                document.documentElement.style.setProperty('--text-muted', '#64748b');
            } else {
                document.documentElement.style.setProperty('--bg-color', '#121212');
                document.documentElement.style.setProperty('--text-color', '#ffffff');
                document.documentElement.style.setProperty('--border-color', 'rgba(255, 255, 255, 0.08)');
                document.documentElement.style.setProperty('--card-bg', 'rgba(255, 255, 255, 0.03)');
                document.documentElement.style.setProperty('--text-muted', '#94a3b8');
            }

            // Update CTA Button
            const ctaBtn = document.getElementById('tih-cta-btn');
            ctaBtn.innerText = ctaText;
            ctaBtn.href = ctaLink;

            // 2. Fetch Facts & Render Card
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            const fullMonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const today = new Date();
            const m = today.getMonth() + 1;
            const d = today.getDate();
            const dateKey = m + "-" + d;
            
            document.getElementById('tih-bg-date').innerText = months[today.getMonth()] + ' ' + d;

            // 3. Post Height updates to the parent page (for the Loader resize logic)
            function sendHeight() {
                setTimeout(() => {
                    const height = document.body.scrollHeight || document.documentElement.scrollHeight;
                    window.parent.postMessage({ type: 'tih-resize', height: height }, '*');
                }, 100);
            }

            // Send height on load, on image load, and on window resize
            window.addEventListener('resize', sendHeight);
            document.getElementById('tih-fact-image').addEventListener('load', sendHeight);
            
            function fetchFallbackWikiImage(searchText, fallbackSrc, factImage, learnMoreLink) {
                const words = searchText.split(' ').slice(0, 7).join(' ').replace(/[^a-zA-Z0-9\s]/g, '').trim();
                const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(words)}&format=json&origin=*`;
                
                fetch(searchUrl)
                .then(res => {
                    if (!res.ok) throw new Error("Search API error");
                    return res.json();
                })
                .then(searchData => {
                    const results = searchData.query && searchData.query.search;
                    if (results && results.length > 0) {
                        const firstTitle = results[0].title;
                        const imgUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(firstTitle)}&prop=pageimages&pithumbsize=500&format=json&origin=*`;
                        
                        return fetch(imgUrl)
                        .then(res => res.json())
                        .then(imgData => {
                            const pages = imgData.query && imgData.query.pages;
                            if (pages) {
                                const pageKey = Object.keys(pages)[0];
                                const page = pages[pageKey];
                                if (page && page.thumbnail && page.thumbnail.source) {
                                    factImage.onerror = function() {
                                        factImage.src = fallbackSrc;
                                        factImage.onerror = null;
                                        sendHeight();
                                    };
                                    factImage.src = page.thumbnail.source;
                                    learnMoreLink.href = `https://en.wikipedia.org/wiki/${encodeURIComponent(firstTitle)}`;
                                    sendHeight();
                                    return;
                                }
                            }
                            throw new Error("No thumbnail found for page: " + firstTitle);
                        });
                    }
                    throw new Error("No search results found");
                })
                .catch(err => {
                    console.error("Wikipedia search image fallback failed:", err);
                    factImage.src = fallbackSrc;
                    sendHeight();
                });
            }

            // Trigger height checks after fetches complete
            fetch('/historyFacts.json')
            .then(res => {
                if (!res.ok) throw new Error("Could not load history facts.");
                return res.json();
            })
            .then(historyFacts => {
                const factData = historyFacts[dateKey] || { 
                    "year": "1776", 
                    "text": "The American experiment began—a country built on the radical idea that ordinary people could govern themselves. A story still being written today." 
                };

                document.getElementById('tih-date-subheader').innerText = fullMonths[today.getMonth()] + " " + d + ", " + factData.year;
                document.getElementById('tih-fact-text').innerText = factData.text;
                
                const factImage = document.getElementById('tih-fact-image');
                const fallbackSrc = factImage.getAttribute('data-fallback');
                const learnMoreLink = document.getElementById('tih-learn-more-link');

                // Generate fallback Google Search query (will be overridden if Wikipedia resolves)
                const searchQuery = encodeURIComponent(factData.year + " " + fullMonths[today.getMonth()] + " " + d + " " + factData.text.split(',')[0].split('.')[0].trim());
                learnMoreLink.href = `https://www.google.com/search?q=${searchQuery}`;
                
                if (factData.supabase_image) {
                    factImage.src = factData.supabase_image;
                    factImage.onerror = function() {
                        factImage.src = fallbackSrc;
                        factImage.onerror = null;
                        sendHeight();
                    };
                    factImage.addEventListener('load', sendHeight);
                } else {
                    // Fetch historical image and link directly from Wikipedia API
                    const padMonth = m.toString().padStart(2, '0');
                    const padDay = d.toString().padStart(2, '0');
                    const wikiUrl = `https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/${padMonth}/${padDay}`;
                    
                    fetch(wikiUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('Wikipedia API error');
                        return response.json();
                    })
                    .then(data => {
                        const events = data.events || [];
                        const matchEvent = events.find(e => e.year && e.year.toString() === factData.year.toString());
                        
                        if (matchEvent && matchEvent.pages && matchEvent.pages.length > 0) {
                            const pageWithThumb = matchEvent.pages.find(p => p.thumbnail && p.thumbnail.source);
                            if (pageWithThumb) {
                                factImage.onerror = function() {
                                    factImage.src = fallbackSrc;
                                    factImage.onerror = null;
                                    sendHeight();
                                };
                                factImage.src = pageWithThumb.thumbnail.source;
                                factImage.addEventListener('load', sendHeight);
                                
                                const desktopUrl = pageWithThumb.content_urls && pageWithThumb.content_urls.desktop && pageWithThumb.content_urls.desktop.page;
                                if (desktopUrl) {
                                    learnMoreLink.href = desktopUrl;
                                }
                                return;
                            }
                        }
                        // Secondary fallback: search Wikipedia for the fact text directly
                        fetchFallbackWikiImage(factData.text, fallbackSrc, factImage, learnMoreLink);
                    })
                    .catch(err => {
                        console.error('Wikipedia image resolution error:', err);
                        fetchFallbackWikiImage(factData.text, fallbackSrc, factImage, learnMoreLink);
                    });
                }
                sendHeight();
            })
            .catch(err => {
                console.error("Error building today-in-history widget:", err);
                document.getElementById('tih-date-subheader').innerText = fullMonths[today.getMonth()] + " " + d + ", 1776";
                document.getElementById('tih-fact-text').innerText = "The American experiment began—a country built on the radical idea that ordinary people could govern themselves.";
                sendHeight();
            });
        });
    </script>
</body>
</html>
